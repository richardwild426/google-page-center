name: Release

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package extension
        run: |
          zip -r google-page-center.zip . \
            -x '.git/*' '.github/*' '.gitignore' '.DS_Store' \
               'BUILD.md' 'yarn.lock' '_metadata/*'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-page-center
          path: google-page-center.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: google-page-center.zip
          generate_release_notes: true
